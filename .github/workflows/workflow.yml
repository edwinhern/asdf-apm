name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 0 * * 5"

jobs:
  lint:
    name: Lint shell scripts and markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: asdf-vm/actions/install@v4
      - run: make lint

  actions_lint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

  test:
    name: Test plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install bats
        run: sudo apt-get install -y bats
      - name: Run tests
        run: make test
        env:
          GITHUB_API_TOKEN: ${{ github.token }}

  test_plugin:
    name: Test plugin on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Test plugin on ${{ matrix.os }}
        uses: asdf-vm/actions/plugin-test@v4
        with:
          command: apm --version
        env:
          GITHUB_API_TOKEN: ${{ github.token }}
